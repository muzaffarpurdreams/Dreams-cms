services:
  - type: web
    name: dreams-cms
    env: node
    plan: free
    region: ohio
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: dreams-db
          property: connectionString
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      # You will need to manually add these in the Render dashboard after deployment:
      # - CLOUDINARY_NAME
      # - CLOUDINARY_KEY
      # - CLOUDINARY_SECRET

databases:
  - name: dreams-db
    plan: free
    region: ohio
