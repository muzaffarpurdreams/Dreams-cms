services:
  - type: web
    name: dreams-cms
    env: node
    plan: free
    region: ohio
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: dreams-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: dreams-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: dreams-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: dreams-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dreams-db
          property: password
      - key: FRONTEND_URL
        value: https://dreamfurnitures.com
      - key: FRONTEND_WWW_URL
        value: https://www.dreamfurnitures.com
      - key: ENABLE_SEED_DATA
        value: false
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      # You will need to manually add these in the Render dashboard after deployment.
      # Either naming scheme works:
      # - CLOUDINARY_NAME / CLOUDINARY_KEY / CLOUDINARY_SECRET
      # or
      # - CLOUDINARY_CLOUD_NAME / CLOUDINARY_API_KEY / CLOUDINARY_API_SECRET

databases:
  - name: dreams-db
    plan: free
    region: ohio
